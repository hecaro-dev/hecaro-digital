kind = "web"
previewPath = "/"
title = "Digital Solutions"
version = "1.0.0"
id = "artifacts/digital-solutions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21406

[services.development]
run = "pnpm --filter @workspace/digital-solutions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-solutions", "run", "build" ]

[services.production.run]
args = [ "node", "artifacts/digital-solutions/.next/standalone/artifacts/digital-solutions/server.js" ]

[services.production.run.env]
PORT = "8080"
HOSTNAME = "0.0.0.0"

[services.env]
PORT = "21406"
HOSTNAME = "0.0.0.0"
