kind = "web"
previewPath = "/"
title = "Digital Solutions"
version = "1.0.0"
id = "artifacts/digital-solutions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21406

[services.development]
run = "pnpm --filter @workspace/digital-solutions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-solutions", "run", "build" ]
publicDir = "artifacts/digital-solutions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21406"
BASE_PATH = "/"
